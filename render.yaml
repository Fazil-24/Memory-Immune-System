services:
  - type: web
    name: memory-immune-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: EMBEDDING_PROVIDER
        sync: false
      - key: EMBEDDING_MODEL
        sync: false
      - key: ENABLE_BACKEND_ACCESS_CONTROL
        value: "false"
      - key: DATASET_NAME
        value: "compliance_brain"
